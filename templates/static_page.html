{% extends "base.html" %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="article-body" style="max-width:760px;margin:0 auto;">
            <h1>{{ page_title }}</h1>
            {% if page_intro %}
            <p class="article-lead">{{ page_intro }}</p>
            {% endif %}
            {{ page_content | safe }}
        </div>
    </div>
</section>
{% endblock %}
